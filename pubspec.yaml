name: ghosted
description: A high-energy GenZ "Uni-Survival" game built with Flutter Web and optimized for Firebase Spark Plan.
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

version: 2.1.1+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # Core
  cupertino_icons: ^1.0.2
  go_router: ^12.1.1
  http: ^1.2.0
  provider: ^6.1.1
  shared_preferences: ^2.2.2
  
  # Firebase & Optimization
  firebase_core: ^4.5.0
  firebase_auth: ^6.2.0
  cloud_firestore: ^6.1.3
  firebase_storage: ^13.1.0
  image_picker: ^1.0.7
  flutter_image_compress: ^2.1.0

  # UI / UX
  animate_do: ^3.3.4
  google_fonts: ^6.1.0
  flutter_animate: ^4.5.2
  flutter_card_swiper: ^7.0.0
  lucide_icons: any
  flutter_staggered_grid_view: any
  emoji_picker_flutter: ^1.6.3
  
  # Multimedia
  video_player: ^2.8.2
  record: ^5.0.0
  path_provider: ^2.1.2
  crypto: ^3.0.7
  file_picker: ^10.3.10
  url_launcher: ^6.3.2
  flutter_vibrate: ^1.4.0
  youtube_explode_dart: ^3.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/
